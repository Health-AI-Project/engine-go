syntax = "proto3";
package core;

option go_package = "healthai/engine/proto/core";

service CoreService {
  // --- Existing (Originally in UserService) ---
  rpc GetUserProfile(UserIdRequest) returns (UserProfileResponse);
  rpc GetDailyStats(UserIdRequest) returns (DailyStatsResponse);
  rpc UpdateBiometrics(BiometricsRequest) returns (Empty);
  rpc LogNutrition(NutritionRequest) returns (Ack);
  rpc LogWorkout(WorkoutRequest) returns (Ack);
  rpc UpdateHealthProfile(UpdateHealthProfileRequest) returns (Ack);

  // --- NEW FEATURES ---
  rpc UpdateFoodPreferences(PreferenceRequest) returns (Ack);
  rpc AnalyzeMeal(MealInput) returns (AnalysisReport);
  rpc GetMealPlan(DateRequest) returns (MealPlanResponse);
  rpc GetFoodPreferences(UserIdRequest) returns (FoodPreferencesResponse);
  rpc GetWorkoutRecommendation(WorkoutConstraints) returns (WorkoutPlan);
  rpc GetCaloriesHistory(HistoryRequest) returns (CaloriesHistoryResponse);
  rpc GetWeightHistory(HistoryRequest) returns (WeightHistoryResponse);
}

// --- Messages ---

// Existing & Shared
message UserIdRequest { string user_id = 1; }
message Empty {}
message Ack { bool success = 1; string message = 2; }

message UserProfileResponse {
  string id = 1;
  string email = 2;
  string subscription_status = 3;
  double weight = 4;
  double height = 5;
  bool is_premium = 6;
  string date_of_birth = 7;
  int32 age = 8;
  repeated string goals = 9;
  repeated string allergies = 10;
}

message FoodPreferencesResponse {
  repeated string allergies = 1;
  string diet_type = 2;
  repeated string disliked_ingredients = 3;
}

message DailyStatsResponse {
  double calories = 1;
  double protein = 2;
  double carbs = 3;
  double fat = 4;
  int32 workouts_count = 5;
}

message BiometricsRequest { string user_id = 1; double weight = 2; double height = 3; }

message NutritionRequest { string user_id = 1; double calories = 2; double protein = 3; double carbs = 4; double fat = 5; }

message WorkoutRequest { string user_id = 1; string type = 2; int32 duration_minutes = 3; double calories_burned = 4; }

message UpdateHealthProfileRequest {
  string user_id = 1;
  string date_of_birth = 2;
  repeated string goals = 3;
  repeated string allergies = 4;
  double weight = 5;
  double height = 6;
}

// New Features

message PreferenceRequest {
  string user_id = 1;
  repeated string allergies = 2;
  string diet_type = 3;
}

message MealInput {
  string user_id = 1;
  repeated string ingredients = 2;
  double calories = 3;
  double protein = 4;
}

message AnalysisReport {
  bool is_safe = 1;
  repeated string warnings = 2;
  string advice = 3;
}

message DateRequest {
  string user_id = 1;
  string date = 2;
}

message MealPlanResponse {
  repeated MealSuggestion meals = 1;
}

message MealSuggestion {
  string name = 1;
  double calories = 2;
}

message WorkoutConstraints {
  string user_id = 1;
  int32 duration_minutes = 2;
  string equipment_level = 3;
  repeated string injuries = 4;
}

message WorkoutPlan {
  repeated Exercise exercises = 1;
  int32 total_duration = 2;
}

message Exercise {
  string name = 1;
  int32 duration = 2;
  string type = 3;
}

// --- History ---

message HistoryRequest {
  string user_id = 1;
  int32 days = 2;
}

message DailyLogEntry {
  string date = 1;
  double calories = 2;
  double protein = 3;
  double carbs = 4;
  double fat = 5;
}

message CaloriesHistoryResponse {
  repeated DailyLogEntry entries = 1;
}

message WeightEntry {
  string date = 1;
  double weight = 2;
}

message WeightHistoryResponse {
  repeated WeightEntry entries = 1;
}
